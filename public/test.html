<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Test</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      cursor="fuse: false; rayOrigin: mouse;"  >
      <script>
        // タップされた時の処理
        AFRAME.registerComponent('tap-listener', {
          init: function () {
            var el = this.el;
            el.addEventListener('click', function (evt) {
              // タップされたら、色を「赤」に変えて、メッセージを出す
              el.setAttribute('material', 'color: #ff1744;');
              alert('宝箱を開けました！\nおめでとう！'); 
              
              // 3秒後に元の色に戻す（オプション）
              setTimeout(function(){
                el.setAttribute('material', 'color: #00e5ff;');
              }, 3000);
            });
          }
        });
      </script>

      <a-box 
        tap-listener  gps-entity-place="latitude: 35.807097; longitude: 139.450247;" 
        scale="15 15 15" 
        material="color: #00e5ff; opacity: 0.8; transparent: true;"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"
      ></a-box>

      <a-camera gps-camera rotation-reader>
        <a-cursor fuse="false" color="#ff1744"></a-cursor>
      </camera>
    </a-scene>
  </body>
</html>
